<!DOCTYPE html>
<html lang="vi">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>BrightWay Scholars – Chi tiết Học Bổng theo Trường</title>
<link rel="preconnect" href="https://fonts.googleapis.com" />
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
<link href="https://fonts.googleapis.com/css2?family=Be+Vietnam+Pro:wght@400;500;600;700;800&family=Nunito:wght@700;800;900&display=swap" rel="stylesheet" />
<style>
:root {
  --font: 'Be Vietnam Pro', sans-serif;
  --font-display: 'Nunito', 'Be Vietnam Pro', sans-serif;
  --accent: #6366f1;
  --accent2: #7c3aed;
  --grad: linear-gradient(135deg, #6366f1, #7c3aed);
  --grad-btn: linear-gradient(135deg, #6366f1, #818cf8);
  --text-dark: #1a1a3e;
  --text-mid: #374151;
  --text-soft: #6b7280;
  --shadow: 0 4px 16px rgba(99,102,241,0.1);
  --shadow-lg: 0 12px 32px rgba(99,102,241,0.15);
}
*, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
body {
  font-family: var(--font);
  background: linear-gradient(135deg, #eef2ff 0%, #f0f4ff 40%, #faf5ff 70%, #f5f3ff 100%);
  color: var(--text-mid);
  min-height: 100vh;
}
html { scroll-behavior: smooth; }

/* ── NAV ── */
.p2-nav {
  position: sticky; top: 0; z-index: 100;
  background: rgba(255,255,255,0.82);
  backdrop-filter: blur(14px);
  border-bottom: 1px solid rgba(255,255,255,0.85);
  box-shadow: 0 2px 12px rgba(99,102,241,0.08);
}
.p2-nav-inner {
  max-width: 1200px; margin: 0 auto;
  padding: 12px 24px;
  display: flex; align-items: center; justify-content: space-between; gap: 16px;
}
.p2-nav-logo {
  font-family: var(--font-display);
  font-weight: 900; font-size: 1rem;
  background: var(--grad); -webkit-background-clip: text; background-clip: text; color: transparent;
  text-decoration: none; white-space: nowrap;
}
.p2-back {
  display: inline-flex; align-items: center; gap: 6px;
  background: rgba(99,102,241,0.1); color: var(--accent);
  font-weight: 700; font-size: .82rem;
  padding: 7px 16px; border-radius: 999px;
  text-decoration: none; transition: all .2s;
  border: 1px solid rgba(99,102,241,0.18);
}
.p2-back:hover { background: var(--grad-btn); color: #fff; border-color: transparent; }
.p2-search-bar {
  flex: 1; max-width: 360px; position: relative;
}
.p2-search-bar input {
  width: 100%; border: 1.5px solid rgba(99,102,241,0.22);
  border-radius: 14px; padding: 8px 12px 8px 36px;
  font-size: .85rem; outline: none;
  background: rgba(255,255,255,0.85); color: var(--text-dark);
  font-family: var(--font); transition: border-color .15s, box-shadow .15s;
}
.p2-search-bar input:focus { border-color: var(--accent); box-shadow: 0 0 0 4px rgba(99,102,241,0.12); }
.p2-search-bar svg {
  position: absolute; left: 10px; top: 50%; transform: translateY(-50%);
  width: 16px; height: 16px; stroke: rgba(99,102,241,0.5);
  fill: none; stroke-width: 2; stroke-linecap: round; stroke-linejoin: round;
  pointer-events: none;
}
@media(max-width:640px) {
  .p2-search-bar { max-width: 100%; order: 3; flex-basis: 100%; }
  .p2-nav-inner { flex-wrap: wrap; }
}

/* ── SIDEBAR ── */
.p2-layout {
  max-width: 1200px; margin: 0 auto; padding: 24px;
  display: grid; grid-template-columns: 240px 1fr; gap: 24px;
}
@media(max-width:900px) { .p2-layout { grid-template-columns: 1fr; } }
.p2-sidebar {
  position: sticky; top: 80px; align-self: start;
  background: rgba(255,255,255,0.65);
  border: 1.5px solid rgba(255,255,255,0.9);
  border-radius: 20px; backdrop-filter: blur(12px);
  box-shadow: var(--shadow); padding: 16px;
  max-height: calc(100vh - 100px); overflow-y: auto;
}
@media(max-width:900px) {
  .p2-sidebar {
    position: static; max-height: none;
    display: flex; flex-wrap: wrap; gap: 6px; padding: 12px;
  }
  .p2-sidebar-title { display: none; }
}
.p2-sidebar-title {
  font-family: var(--font-display); font-weight: 800;
  font-size: .88rem; color: var(--text-dark); margin-bottom: 12px;
}
.p2-sidebar a {
  display: block; padding: 8px 12px; border-radius: 10px;
  font-size: .82rem; font-weight: 600; color: var(--text-soft);
  text-decoration: none; transition: all .15s; margin-bottom: 2px;
}
@media(max-width:900px) {
  .p2-sidebar a { margin-bottom: 0; padding: 6px 10px; font-size: .78rem; }
}
.p2-sidebar a:hover, .p2-sidebar a.active {
  background: rgba(99,102,241,0.1); color: var(--accent);
}

/* ── MAIN CONTENT ── */
.p2-main { display: flex; flex-direction: column; gap: 32px; }

/* ── SCHOOL SECTION ── */
.school-section {
  scroll-margin-top: 90px;
  transition: box-shadow .4s;
}
.school-section.highlight {
  animation: highlightPulse 1.5s ease;
}
@keyframes highlightPulse {
  0% { box-shadow: 0 0 0 4px rgba(99,102,241,0.4); border-radius: 22px; }
  100% { box-shadow: 0 0 0 0 rgba(99,102,241,0); }
}
.school-header {
  background: rgba(255,255,255,0.65);
  border: 1.5px solid rgba(255,255,255,0.9);
  border-radius: 22px 22px 0 0;
  backdrop-filter: blur(12px);
  padding: 20px 24px;
  display: flex; align-items: center; gap: 16px;
  flex-wrap: wrap;
}
.school-icon {
  width: 52px; height: 52px; border-radius: 14px;
  background: linear-gradient(135deg, rgba(99,102,241,0.12), rgba(167,139,250,0.12));
  display: flex; align-items: center; justify-content: center;
  font-size: 1.4rem; flex-shrink: 0;
}
.school-info { flex: 1; }
.school-name {
  font-family: var(--font-display); font-weight: 800;
  font-size: 1.15rem; color: var(--text-dark);
}
.school-badges { display: flex; flex-wrap: wrap; gap: 6px; margin-top: 6px; }
.school-badge-short {
  display: inline-block; border-radius: 999px; padding: 2px 10px;
  font-size: .73rem; font-weight: 600;
  background: rgba(99,102,241,0.1); color: var(--accent);
  border: 1px solid rgba(99,102,241,0.18);
}
.school-badge-city {
  display: inline-block; border-radius: 999px; padding: 2px 10px;
  font-size: .73rem; font-weight: 600;
  background: transparent; border: 1px solid rgba(99,102,241,0.22); color: var(--text-soft);
}

/* ── SCHOLARSHIP CARDS ── */
.school-cards {
  background: rgba(255,255,255,0.55);
  border: 1.5px solid rgba(255,255,255,0.85);
  border-top: none;
  border-radius: 0 0 22px 22px;
  backdrop-filter: blur(10px);
  padding: 20px 24px;
  display: flex; flex-direction: column; gap: 16px;
}
.sc-card {
  background: rgba(255,255,255,0.72);
  border: 1.5px solid rgba(255,255,255,0.9);
  border-radius: 16px; padding: 18px;
  box-shadow: var(--shadow);
  transition: transform .2s, box-shadow .2s;
}
.sc-card:hover { transform: translateY(-2px); box-shadow: var(--shadow-lg); }
.sc-card-title {
  font-family: var(--font-display); font-weight: 700;
  font-size: .95rem; color: var(--accent); margin-bottom: 10px;
  display: flex; align-items: center; gap: 8px;
}
.sc-row { display: flex; flex-wrap: wrap; gap: 8px 16px; margin-bottom: 8px; }
.sc-label {
  font-size: .78rem; font-weight: 700; color: var(--text-dark); min-width: 120px;
}
.sc-value { font-size: .82rem; color: var(--text-soft); flex: 1; line-height: 1.6; }
.sc-tag {
  display: inline-block; border-radius: 8px; padding: 3px 10px;
  font-size: .73rem; font-weight: 600;
  background: rgba(99,102,241,0.08); color: var(--accent);
  border: 1px solid rgba(99,102,241,0.15);
}
.sc-tag-green {
  background: rgba(16,185,129,0.08); color: #059669;
  border-color: rgba(16,185,129,0.2);
}
.sc-tag-amber {
  background: rgba(245,158,11,0.08); color: #d97706;
  border-color: rgba(245,158,11,0.2);
}
.sc-note {
  border-radius: 10px; border: 1px solid rgba(251,191,36,0.35);
  background: rgba(254,249,195,0.7); padding: 10px 14px;
  font-size: .82rem; color: #92400e; line-height: 1.6;
  margin-top: 8px;
}
.sc-updating {
  text-align: center; padding: 24px;
  color: var(--text-soft); font-size: .88rem;
}

/* ── ESSAY SECTION ── */
.essay-section {
  scroll-margin-top: 90px;
  border-radius: 22px;
  overflow: hidden;
  box-shadow: 0 8px 28px rgba(99,102,241,0.10);
  transition: box-shadow .4s;
}
.essay-section.highlight {
  animation: highlightPulse 1.5s ease;
}
.essay-header {
  background: linear-gradient(135deg, #6366f1 0%, #7c3aed 100%);
  padding: 28px 28px 22px;
  display: flex; align-items: flex-start; gap: 18px;
}
.essay-header-icon {
  width: 56px; height: 56px; border-radius: 16px;
  background: rgba(255,255,255,0.18); border: 1.5px solid rgba(255,255,255,0.3);
  display: flex; align-items: center; justify-content: center;
  font-size: 1.6rem; flex-shrink: 0;
}
.essay-header-info { flex: 1; }
.essay-header-title {
  font-family: var(--font-display); font-weight: 900;
  font-size: 1.25rem; color: #fff; margin-bottom: 4px;
}
.essay-header-sub { font-size: .85rem; color: rgba(255,255,255,0.8); line-height: 1.5; }
.essay-body {
  background: rgba(255,255,255,0.6);
  border: 1.5px solid rgba(255,255,255,0.9);
  border-top: none; border-radius: 0 0 22px 22px;
  backdrop-filter: blur(10px);
  padding: 24px;
  display: flex; flex-direction: column; gap: 24px;
}
.essay-formula {
  background: linear-gradient(135deg, rgba(99,102,241,0.07), rgba(124,58,237,0.05));
  border: 1.5px solid rgba(99,102,241,0.18);
  border-radius: 16px; padding: 18px 20px;
  display: flex; flex-direction: column; gap: 10px;
}
.essay-formula-title {
  font-size: .8rem; font-weight: 800; color: var(--accent); text-transform: uppercase; letter-spacing: .05em;
}
.essay-formula-steps {
  display: flex; flex-wrap: wrap; align-items: center; gap: 6px;
}
.essay-formula-step {
  display: inline-flex; align-items: center; gap: 5px;
  background: rgba(255,255,255,0.8); border: 1.5px solid rgba(99,102,241,0.2);
  border-radius: 999px; padding: 5px 12px;
  font-size: .78rem; font-weight: 700; color: var(--text-dark);
}
.essay-formula-arrow { color: var(--accent); font-size: .85rem; font-weight: 900; }
.essay-formula-note {
  font-size: .8rem; color: var(--text-soft); line-height: 1.55;
  border-top: 1px solid rgba(99,102,241,0.12); padding-top: 10px; margin-top: 2px;
}
.essay-block-title {
  font-family: var(--font-display); font-weight: 800;
  font-size: .95rem; color: var(--text-dark);
  display: flex; align-items: center; gap: 8px; margin-bottom: 12px;
}
.essay-struct-grid {
  display: grid; grid-template-columns: repeat(auto-fill, minmax(220px, 1fr)); gap: 14px;
}
.essay-struct-card {
  background: rgba(255,255,255,0.78); border: 1.5px solid rgba(255,255,255,0.9);
  border-radius: 16px; padding: 16px 18px;
  box-shadow: 0 2px 10px rgba(99,102,241,0.07);
}
.essay-struct-card-head {
  display: flex; align-items: center; gap: 10px; margin-bottom: 10px;
}
.essay-struct-num {
  width: 28px; height: 28px; border-radius: 50%;
  background: var(--grad); color: #fff;
  display: flex; align-items: center; justify-content: center;
  font-size: .78rem; font-weight: 800; flex-shrink: 0;
}
.essay-struct-label {
  font-weight: 800; font-size: .88rem; color: var(--text-dark);
}
.essay-struct-items { list-style: none; display: flex; flex-direction: column; gap: 6px; }
.essay-struct-items li {
  display: flex; gap: 8px; align-items: flex-start;
  font-size: .8rem; color: var(--text-soft); line-height: 1.5;
}
.essay-struct-items li::before {
  content: '›'; color: var(--accent); font-weight: 900; flex-shrink: 0; margin-top: 0;
}
.essay-tips-grid {
  display: grid; grid-template-columns: repeat(auto-fill, minmax(200px, 1fr)); gap: 12px;
}
.essay-tip-card {
  background: rgba(255,255,255,0.75); border: 1.5px solid rgba(255,255,255,0.9);
  border-radius: 14px; padding: 14px 16px;
  box-shadow: 0 2px 8px rgba(99,102,241,0.06);
  transition: transform .18s, box-shadow .18s;
}
.essay-tip-card:hover { transform: translateY(-2px); box-shadow: 0 6px 18px rgba(99,102,241,0.12); }
.essay-tip-icon { font-size: 1.3rem; margin-bottom: 7px; }
.essay-tip-name { font-weight: 800; font-size: .84rem; color: var(--text-dark); margin-bottom: 5px; }
.essay-tip-desc { font-size: .78rem; color: var(--text-soft); line-height: 1.55; }
.essay-sidebar-link {
  margin-top: 10px;
  border-top: 1px solid rgba(99,102,241,0.1);
  padding-top: 10px;
}
.essay-sidebar-label {
  font-size: .7rem; font-weight: 800; color: var(--text-soft);
  text-transform: uppercase; letter-spacing: .06em; padding: 6px 10px 4px;
}

/* ── FOOTER ── */
.p2-footer {
  background: rgba(255,255,255,0.55);
  backdrop-filter: blur(12px);
  border-top: 1px solid rgba(255,255,255,0.85);
  margin-top: 24px; padding: 20px 24px;
  text-align: center; font-size: .82rem; color: var(--text-soft);
}
.p2-footer a { color: var(--accent); text-decoration: none; font-weight: 600; }
.p2-footer a:hover { text-decoration: underline; }

/* ── NO RESULTS ── */
.p2-no-results {
  text-align: center; padding: 48px 24px;
  color: var(--text-soft); font-size: .9rem;
  border: 1.5px dashed rgba(99,102,241,0.25);
  border-radius: 22px; background: rgba(255,255,255,0.5);
}

/* ── Scrollbar ── */
::-webkit-scrollbar { width: 6px; height: 6px; }
::-webkit-scrollbar-track { background: rgba(99,102,241,0.05); }
::-webkit-scrollbar-thumb { background: rgba(99,102,241,0.25); border-radius: 3px; }
::-webkit-scrollbar-thumb:hover { background: rgba(99,102,241,0.45); }
/* ── ACCORDION DETAIL ── */
.essay-accordion-card:hover { box-shadow: 0 6px 22px rgba(99,102,241,0.13); }
.essay-accordion-card.open { background: rgba(255,255,255,0.9); }
.acc-section-title {
  font-weight: 800; font-size: .82rem; color: var(--accent);
  margin-bottom: 8px; display: flex; align-items: center; gap: 6px;
}
.acc-list { list-style: none; display: flex; flex-direction: column; gap: 5px; padding-left: 0; }
.acc-list li {
  display: flex; gap: 8px; align-items: flex-start;
  font-size: .8rem; color: var(--text-soft); line-height: 1.55;
}
.acc-list li::before { content: '›'; color: var(--accent); font-weight: 900; flex-shrink: 0; }
.acc-list-danger li::before { content: '⚠'; font-style: normal; }
.acc-method-card {
  background: rgba(99,102,241,0.04); border: 1px solid rgba(99,102,241,0.12);
  border-radius: 12px; padding: 12px 14px; margin-bottom: 10px;
}
.acc-method-title {
  font-weight: 800; font-size: .82rem; color: var(--text-dark);
  margin-bottom: 8px; display: flex; flex-wrap: wrap; align-items: center; gap: 6px;
}
.acc-quote {
  background: rgba(255,255,255,0.8); border-left: 3px solid var(--accent);
  padding: 8px 12px; border-radius: 0 8px 8px 0;
  font-size: .79rem; color: var(--text-mid); line-height: 1.6;
  font-style: italic; margin: 6px 0;
}
.acc-tip { font-size: .78rem; color: var(--text-soft); margin-top: 6px; line-height: 1.5; }
.acc-warn {
  font-size: .78rem; color: #d97706; margin-top: 8px;
  background: rgba(245,158,11,0.08); border-radius: 8px; padding: 6px 10px;
  border: 1px solid rgba(245,158,11,0.2);
}
.acc-note {
  border-radius: 10px; border: 1px solid rgba(251,191,36,0.35);
  background: rgba(254,249,195,0.7); padding: 10px 14px;
  font-size: .8rem; color: #92400e; line-height: 1.6; margin-top: 10px;
}
.acc-compare { display: flex; flex-direction: column; gap: 5px; margin: 8px 0; }
.acc-compare-bad {
  font-size: .79rem; color: #dc2626; background: rgba(220,38,38,0.06);
  border-radius: 8px; padding: 5px 10px; border: 1px solid rgba(220,38,38,0.15);
}
.acc-compare-good {
  font-size: .79rem; color: #059669; background: rgba(5,150,105,0.06);
  border-radius: 8px; padding: 5px 10px; border: 1px solid rgba(5,150,105,0.15);
}
.acc-formula-mini {
  font-size: .79rem; font-weight: 700; color: var(--accent);
  background: rgba(99,102,241,0.08); border-radius: 8px; padding: 5px 10px;
  margin: 6px 0; display: inline-block;
}
.acc-badge {
  display: inline-block; border-radius: 999px; padding: 1px 9px;
  font-size: .7rem; font-weight: 700;
}
.acc-badge-green { background: rgba(16,185,129,0.1); color: #059669; border: 1px solid rgba(16,185,129,0.2); }
.acc-badge-purple { background: rgba(99,102,241,0.1); color: var(--accent); border: 1px solid rgba(99,102,241,0.2); }
.acc-badge-amber { background: rgba(245,158,11,0.1); color: #d97706; border: 1px solid rgba(245,158,11,0.2); }
.acc-length-row {
  display: flex; justify-content: space-between; align-items: center;
  font-size: .8rem; color: var(--text-mid); padding: 4px 0;
  border-bottom: 1px solid rgba(99,102,241,0.07);
}
</style>
</head>

              <li>Lặp từ "I" quá nhiều (bài luận tiếng Anh)</li>
              <li>Không chỉnh sửa nhiều lần trước khi nộp</li>
            </ul>
          </div>
        </div>

      </div>
    </div>

    <!-- 9 YẾU TỐ CỐT LÕI -->
    <div>
      <div class="essay-block-title">💡 9 yếu tố cốt lõi giúp bài luận ghi điểm</div>

        <div class="essay-tip-card">
          <div class="essay-tip-icon">🔥</div>

        </div>
        <div class="essay-tip-card">
          <div class="essay-tip-icon">📖</div>
          <div class="essay-tip-name">Câu chuyện có ý nghĩa</div>
          <div class="essay-tip-desc">Kể câu chuyện giúp người đọc hiểu con người bạn và cách bạn đối diện thử thách.</div>
        </div>
        <div class="essay-tip-card">
          <div class="essay-tip-icon">🎯</div>
          <div class="essay-tip-name">Mục tiêu rõ ràng</div>
          <div class="essay-tip-desc">Nêu rõ bạn muốn gì và học bổng sẽ giúp bạn thế nào — hội đồng rất chú trọng điều này.</div>
        </div>
        <div class="essay-tip-card">
          <div class="essay-tip-icon">🧠</div>
          <div class="essay-tip-name">Kết nối với tiêu chí học bổng</div>
          <div class="essay-tip-desc">Hiểu rõ giá trị & sứ mệnh của tổ chức cấp học bổng và thể hiện bạn phù hợp với tiêu chí đó.</div>
        </div>
        <div class="essay-tip-card">
          <div class="essay-tip-icon">✍️</div>
          <div class="essay-tip-name">Ngôn ngữ rõ ràng, logic</div>
          <div class="essay-tip-desc">Trình bày rõ ý, không lan man. Dùng đoạn văn ngắn, dễ đọc, câu chữ mạch lạc.</div>
        </div>
        <div class="essay-tip-card">
          <div class="essay-tip-icon">✔️</div>
          <div class="essay-tip-name">Minh chứng bằng ví dụ cụ thể</div>
          <div class="essay-tip-desc">Đừng chỉ nêu "tôi chăm học" — hãy kể tình huống cụ thể chứng minh điều đó.</div>
        </div>
        <div class="essay-tip-card">
          <div class="essay-tip-icon">😊</div>
          <div class="essay-tip-name">Tích cực & lạc quan</div>
          <div class="essay-tip-desc">Dù kể về khó khăn, hãy chuyển sang hướng tích cực — bạn học được gì và trưởng thành ra sao.</div>
        </div>
        <div class="essay-tip-card">
          <div class="essay-tip-icon">📌</div>
          <div class="essay-tip-name">Tránh lặp lại CV</div>
          <div class="essay-tip-desc">Bài luận cần diễn giải cảm xúc, tư duy, mục tiêu — không chỉ liệt kê lại hồ sơ.</div>
        </div>
        <div class="essay-tip-card">
          <div class="essay-tip-icon">🧹</div>
          <div class="essay-tip-name">Chỉnh sửa & nhận phản hồi</div>
          <div class="essay-tip-desc">Viết xong hãy chỉnh sửa nhiều lần và nhờ giáo viên / mentor góp ý để hoàn thiện.</div>
        </div>
      </div>
    </div>

  </div>
</section>
`;

/* ═══════════════ RENDER ═══════════════ */
const sidebar = document.getElementById('sidebar');
const mainContent = document.getElementById('mainContent');
let searchTerm = '';

function renderSidebar(schools) {
  const titleHtml = '<div class="p2-sidebar-title">📚 Danh sách trường</div>';
  const linksHtml = schools.map(s =>
    `<a href="#${s.id}" data-id="${s.id}" onclick="highlightSection('${s.id}')">${s.icon} ${s.short}</a>`
  ).join('');
  const essayLinkHtml = `
    <div class="essay-sidebar-label">Hướng dẫn</div>
    <a href="#viet-luan" data-id="viet-luan" onclick="highlightSection('viet-luan')" style="color:#6366f1;background:rgba(99,102,241,0.07);border-left:3px solid #6366f1;">✍️ Bí quyết viết luận</a>
  `;
  sidebar.innerHTML = titleHtml + linksHtml + essayLinkHtml;
}

function renderSchools(schools) {
  if (schools.length === 0) {
    mainContent.innerHTML = '<div class="p2-no-results">Không tìm thấy trường phù hợp với từ khóa.</div>';
    return;
  }
  mainContent.innerHTML = schools.map(s => {
    const cardsHtml = s.scholarships.map(sc => `
      <div class="sc-card">
        <div class="sc-card-title">🎓 ${sc.title}</div>
        <div class="sc-row">
          <span class="sc-label">Đối tượng:</span>
          <span class="sc-value">${sc.target}</span>
        </div>
        <div class="sc-row">
          <span class="sc-label">Yêu cầu:</span>
          <span class="sc-value">${sc.requirements}</span>
        </div>
        <div class="sc-row">
          <span class="sc-label">Thời gian:</span>
          <span class="sc-value"><span class="sc-tag sc-tag-green">${sc.timeline}</span></span>
        </div>
        ${sc.note ? `<div class="sc-note">💡 ${sc.note}</div>` : ''}
      </div>
    `).join('');

    return `
      <section class="school-section" id="${s.id}">
        <div class="school-header">
          <div class="school-icon">${s.icon}</div>
          <div class="school-info">
            <h2 class="school-name">${s.website ? `<a href="${s.website}" target="_blank" rel="noopener" style="color:inherit;text-decoration:none;border-bottom:2px solid rgba(99,102,241,0.3);padding-bottom:1px;transition:border-color .2s,color .2s;" onmouseover="this.style.color='#6366f1';this.style.borderColor='#6366f1'" onmouseout="this.style.color='';this.style.borderColor='rgba(99,102,241,0.3)'">${s.name} <svg style="display:inline;vertical-align:middle;margin-left:5px;opacity:.55" width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><path d="M18 13v6a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2V8a2 2 0 0 1 2-2h6"/><polyline points="15 3 21 3 21 9"/><line x1="10" y1="14" x2="21" y2="3"/></svg></a>` : s.name}</h2>
            <div class="school-badges">
              <span class="school-badge-short">${s.short}</span>
              <span class="school-badge-city">📍 ${s.city}</span>
            </div>
          </div>
        </div>
        <div class="school-cards">
          ${cardsHtml}
        </div>
      </section>
    `;
  }).join('') + ESSAY_SECTION_HTML;
}

function filterSchools(val) {
  searchTerm = val.toLowerCase().trim();
  const filtered = SCHOOLS.filter(s =>
    (s.name + ' ' + s.short + ' ' + s.city).toLowerCase().includes(searchTerm)
  );
  renderSidebar(filtered);
  renderSchools(filtered);
}

function highlightSection(id) {
  document.querySelectorAll('.school-section.highlight, .essay-section.highlight').forEach(el => el.classList.remove('highlight'));
  const el = document.getElementById(id);
  if (el) {
    el.scrollIntoView({ behavior: 'smooth', block: 'start' });
    setTimeout(() => el.classList.add('highlight'), 100);
  }
  document.querySelectorAll('.p2-sidebar a').forEach(a => a.classList.remove('active'));
  const link = document.querySelector(`.p2-sidebar a[data-id="${id}"]`);
  if (link) link.classList.add('active');
}

/* ═══════════════ INIT ═══════════════ */

let activeObserver = null;

function setupObserver(currentIds) {
  if (activeObserver) activeObserver.disconnect();

  activeObserver = new IntersectionObserver(entries => {
    entries.forEach(entry => {
      if (entry.isIntersecting) {
        document.querySelectorAll('.p2-sidebar a').forEach(a => a.classList.remove('active'));
        const link = document.querySelector(`.p2-sidebar a[data-id="${entry.target.id}"]`);
        if (link) link.classList.add('active');
      }
    });
  }, { threshold: 0.3, rootMargin: '-80px 0px -40% 0px' });

  currentIds.forEach(id => {
    const el = document.getElementById(id);
    if (el) activeObserver.observe(el);
  });
}

function scrollToTargetFromUrl() {
  const params = new URLSearchParams(window.location.search);
  const fromQuery = params.get('school');
  const fromHash = window.location.hash ? window.location.hash.slice(1) : '';
  const targetId = fromHash || fromQuery;

  if (!targetId) return;

  // If coming from query param, sync to hash so sidebar links behave consistently
  if (!fromHash && fromQuery) {
    window.location.hash = `#${fromQuery}`;
    return; // hashchange will handle the scroll
  }

  const el = document.getElementById(targetId);
  if (el) {
    el.scrollIntoView({ behavior: 'smooth', block: 'start' });
    highlightSection(targetId);

    document.querySelectorAll('.p2-sidebar a').forEach(a => a.classList.remove('active'));
    const link = document.querySelector(`.p2-sidebar a[data-id="${targetId}"]`);
    if (link) link.classList.add('active');
  }
}

function toggleAccordion(card) {
  const detail = card.querySelector('.accordion-detail');
  const arrow = card.querySelector('.accordion-arrow');
  const isOpen = detail.style.display !== 'none';
  detail.style.display = isOpen ? 'none' : 'block';
  arrow.style.transform = isOpen ? '' : 'rotate(180deg)';
  card.classList.toggle('open', !isOpen);
  if (!isOpen) {
    card.style.gridColumn = window.innerWidth > 640 ? '1 / -1' : '';
  } else {
    card.style.gridColumn = '';
  }
}

window.addEventListener('DOMContentLoaded', () => {
  renderSidebar(SCHOOLS);
  renderSchools(SCHOOLS);
  setupObserver([...SCHOOLS.map(s => s.id), 'viet-luan']);

  // Delay a bit to ensure layout is ready
  setTimeout(scrollToTargetFromUrl, 150);
});

window.addEventListener('hashchange', () => {
  setTimeout(scrollToTargetFromUrl, 50);
});
</script>
